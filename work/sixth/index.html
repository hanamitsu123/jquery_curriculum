<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../common/css/reset.css">
  <link rel="stylesheet" href="../../common/css/base.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>Document</title>
</head>
<body>
  <div class="wrapper" id="wrapper">
    <button type="button" class="btn search-btn" id="pokemon_search">ポケモンを探す</button>
  </div>
  <script src="../../common/js/jquery.js"></script>
  <script>

$(function () {
  const initial = $('#wrapper').html();
  $(document).on('click', '#pokemon_search', function () {
      var pokemonNo = Math.floor(Math.random() * 151) + 1;
      $.ajax({
        url: 'https://pokeapi.co/api/v2/pokemon/' + pokemonNo,
        method: 'GET',
        dataType: 'json'
      }).done(function (res) {
        $.getJSON(res.species.url, function (species) {
        let ja = species.names[0].name;
        let encountHtml =
        `<p class="name">${ja}</p>
          <div>
            <img class="img" src="${res.sprites.front_default}" alt="">
          </div>
          <div>
            <button class="btn" id="catch">捕まえる</button>
            <button class="btn" data-js="reset">逃げる</button>
          </div>`;
        $('.wrapper').html(encountHtml);
      }).fail(function () {
        alert('ポケモンの取得に失敗しました');
      });
    });
    $(document).on('click', '#catch', function () {
      let success = Math.random() < 0.5;
      if (success) {
        $.ajax({
          url: 'https://pokeapi.co/api/v2/item/4',
          method: 'GET',
          dataType: 'json'
        }).done(function (res) {
          var doneHtml =
            `<p class="name">ゲットしました！</p>
            <div>
              <img class="img" src="${res.sprites.default}" alt="">
            </div>
            <button class="btn" data-js="reset">戻る</button>`;
          $('.wrapper').html(doneHtml);
        });
      } else {
        var failHtml =
          `<p class="text">逃げられてしまった…</p>
          <button class="btn mt" data-js="reset">戻る</button>`;
        $('.wrapper').html(failHtml);
      }
    });
    $(document).on('click', '[data-js="reset"]', function () {
      $('.wrapper').html(initial);
    });
  });
});
  </script>
</body>
</html>
